<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{DISPLAYNAME}} | Profile</title>
    <meta name="description" content="{{DISPLAYNAME}}'s personal profile page.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family={{NAME_FONT_URL}}&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/style.css">
    {{CUSTOM_CURSOR_STYLE}}
    <style>
        .profile-display-name {
            font-family: '{{NAME_FONT_CSS}}', sans-serif !important;
        }
        /* animations */
        @keyframes nameGlowPulse { 0%,100%{text-shadow:0 0 8px rgba(255,255,255,0.4),0 0 20px rgba(138,43,226,0.4)} 50%{text-shadow:0 0 20px rgba(255,255,255,0.9),0 0 50px rgba(138,43,226,0.9),0 0 80px rgba(255,0,127,0.6)} }
        @keyframes nameGradientWave { 0%{filter:hue-rotate(0deg) brightness(1.2)} 50%{filter:hue-rotate(180deg) brightness(1.5)} 100%{filter:hue-rotate(360deg) brightness(1.2)} }
        @keyframes nameFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes nameFlicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:1;text-shadow:0 0 15px rgba(255,255,255,0.8)} 20%,24%,55%{opacity:0.4;text-shadow:none} }
        @keyframes nameGlitch { 0%,100%{clip-path:none;transform:none} 10%{clip-path:inset(20% 0 60% 0);transform:translate(-4px)} 20%{clip-path:inset(60% 0 20% 0);transform:translate(4px)} 30%{clip-path:none;transform:none} }
        @keyframes nameBounce { 0%,100%{transform:translateY(0);animation-timing-function:cubic-bezier(0.8,0,1,1)} 50%{transform:translateY(-10px);animation-timing-function:cubic-bezier(0,0,0.2,1)} }
        @keyframes nameRainbow { 0%{color:#ff6b6b} 16%{color:#ffd93d} 33%{color:#6bcb77} 50%{color:#4ecdc4} 66%{color:#a855f7} 83%{color:#f97316} 100%{color:#ff6b6b} }
        @keyframes nameShake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-4px)} 20%,40%,60%,80%{transform:translateX(4px)} }
        .name-anim-glow-pulse      { animation: nameGlowPulse 2.5s ease-in-out infinite; }
        .name-anim-gradient-wave   { background:linear-gradient(135deg,#8a2be2,#ff007f,#00c8ff,#8a2be2);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:nameGradientWave 3s linear infinite; }
        .name-anim-float           { animation: nameFloat 3s ease-in-out infinite; display:inline-block; }
        .name-anim-flicker         { animation: nameFlicker 4s infinite; }
        .name-anim-glitch          { animation: nameGlitch 3s infinite; }
        .name-anim-bounce          { animation: nameBounce 1.5s infinite; display:inline-block; }
        .name-anim-rainbow         { animation: nameRainbow 3s linear infinite; }
        .name-anim-shake           { animation: nameShake 0.6s infinite; }
    </style>
</head>
<body class="{{BODY_CLASS}}">

    {{BG_MEDIA_ELEMENT}}
    {{CREATE_BANNER}}

    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="glass-nav">
        <div class="logo">{{DISPLAYNAME}}</div>
        <div class="music-player">
            <button id="music-btn" class="glass-btn" {{SONG_HIDDEN}}>
                <span class="icon">▶</span>
            </button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" class="volume-slider" {{SONG_HIDDEN}}>
        </div>
    </nav>

    <audio id="bg-music" loop>
        <source src="{{SONG_URL}}" type="audio/mpeg">
    </audio>

    <main>
        <section id="home" class="hero">
            <div class="hero-visual hidden-delayed">
                <div class="glass-card main-card">
                    <div class="card-body">

                        <div class="profile-image-container">
                            <img src="{{PHOTO_URL}}" alt="{{DISPLAYNAME}} Profile" class="profile-image" draggable="false">
                        </div>

                        <div class="profile-name-box">
                            <h2 class="profile-display-name name-anim-{{NAME_ANIMATION}}">{{DISPLAYNAME}}</h2>
                            {{PROFILE_BIO}}

                            <!-- Social icon links (guns.lol style) — inside card -->
                            <div class="profile-icon-links">
                                {{PROFILE_LINKS}}
                            </div>


                            <div class="views-badge">👁️ {{VIEWS}} views</div>
                        </div>

                        <div class="hologram-circle"></div>
                    </div>
                </div>
            </div>
        </section>

        <div class="equalizer eq-left">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div>
        </div>
        <div class="equalizer eq-right">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div>
        </div>
    </main>

    {{EDIT_BUTTON}}

    <script>window.MUSIC_AUTO_PLAY = {{MUSIC_AUTO_PLAY}};</script>
    <script src="/public/script.js"></script>
</body>
</html>
