<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Profile</title>
    <meta name="description" content="Create your own premium profile page.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent-1: #8a2be2;
            --accent-2: #ff007f;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Background blobs */
        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            animation: float 18s infinite alternate;
        }

        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, var(--accent-1), transparent 70%);
        }

        .blob-2 {
            bottom: -10%; right: -10%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, var(--accent-2), transparent 70%);
            animation-delay: -9s;
        }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(10%, 15%) scale(1.2); }
            100% { transform: translate(-10%, -10%) scale(0.9); }
        }

        /* Page Layout */
        .page-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 2rem 1.5rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .brand p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* Form Card */
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .form-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin: 1.8rem 0 1rem;
        }

        .form-section-title:first-of-type { margin-top: 0; }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            border-color: rgba(138, 43, 226, 0.5);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.15);
        }

        input[type="text"]::placeholder,
        input[type="url"]::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .username-wrapper {
            position: relative;
        }

        .username-prefix {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1rem;
            pointer-events: none;
        }

        .username-wrapper input {
            padding-left: 2.8rem;
        }

        /* File Upload */
        .file-upload {
            position: relative;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .file-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px dashed var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            border-color: rgba(138, 43, 226, 0.5);
            background: rgba(255,255,255,0.07);
        }

        .file-icon { font-size: 1.4rem; }
        .file-text { color: var(--muted); font-size: 0.9rem; }
        .file-name { color: #fff; font-size: 0.85rem; margin-top: 0.4rem; display: none; }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            margin-top: 2rem;
            background: #fff;
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: -0.3px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .note {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        /* Error Message */
        .error-msg {
            background: rgba(255, 0, 80, 0.1);
            border: 1px solid rgba(255, 0, 80, 0.3);
            color: #ff5080;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        @media (max-width: 480px) {
            .form-card { padding: 2rem 1.2rem; }
            .brand h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="page-wrapper">
        <div class="brand">
            <h1>Create Profile</h1>
            <p>Get your own premium profile page instantly</p>
        </div>

        <div class="form-card">
            <div class="error-msg" id="error-msg"></div>

            <form id="profile-form" action="/create" method="POST" enctype="multipart/form-data">

                <p class="form-section-title">Identity</p>

                <div class="form-group">
                    <label>Username (your page URL)</label>
                    <div class="username-wrapper">
                        <span class="username-prefix">@</span>
                        <input type="text" name="username" id="username"
                            placeholder="e.g. tanu"
                            pattern="[a-z0-9_]{2,20}"
                            title="2-20 lowercase letters, numbers, or underscores"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Display Name (shown on your page)</label>
                    <input type="text" name="displayname" placeholder="e.g. Tanu ✨" required>
                </div>

                <p class="form-section-title">Media</p>

                <div class="form-group">
                    <label>Profile Photo</label>
                    <div class="file-upload">
                        <input type="file" name="photo" id="photo-input" accept="image/*">
                        <div class="file-label">
                            <span class="file-icon">🖼️</span>
                            <div>
                                <div class="file-text">Click to upload photo</div>
                                <div class="file-name" id="photo-name"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Background Song (MP3)</label>
                    <div class="file-upload">
                        <input type="file" name="song" id="song-input" accept="audio/mpeg,audio/mp3">
                        <div class="file-label">
                            <span class="file-icon">🎵</span>
                            <div>
                                <div class="file-text">Click to upload song (MP3)</div>
                                <div class="file-name" id="song-name"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <p class="form-section-title">Social Links <span style="opacity:0.5;font-size:0.7rem">(optional)</span></p>

                <div class="form-group">
                    <label>Instagram URL</label>
                    <input type="url" name="instagram" placeholder="https://instagram.com/your_handle">
                </div>

                <div class="form-group">
                    <label>Discord Link</label>
                    <input type="url" name="discord" placeholder="https://discord.gg/yourserver">
                </div>

                <div class="form-group">
                    <label>YouTube Channel URL</label>
                    <input type="url" name="youtube" placeholder="https://youtube.com/@yourchannel">
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Create My Profile →</button>
            </form>

            <p class="note">Your profile will be live at <b>yoursite.com/@username</b></p>
        </div>
    </div>

    <script>
        // Show selected file names
        document.getElementById('photo-input').addEventListener('change', function() {
            const nameEl = document.getElementById('photo-name');
            nameEl.textContent = this.files[0]?.name || '';
            nameEl.style.display = this.files[0] ? 'block' : 'none';
        });

        document.getElementById('song-input').addEventListener('change', function() {
            const nameEl = document.getElementById('song-name');
            nameEl.textContent = this.files[0]?.name || '';
            nameEl.style.display = this.files[0] ? 'block' : 'none';
        });

        // Username lowercase enforce
        document.getElementById('username').addEventListener('input', function() {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
        });

        // Submit loading state
        document.getElementById('profile-form').addEventListener('submit', function() {
            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Creating...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
